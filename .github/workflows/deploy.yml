name: Deploy to Server

on:
  push:
    branches:
      - main   # или другая ветка, которую хочешь деплоить

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/floorplan-wizard-builder/
            git stash
            git pull
            /root/.nvm/versions/node/v22.18.0/bin/npm install
            /root/.nvm/versions/node/v22.18.0/bin/npm run build
