<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Cache Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #widget-container {
            width: 100%;
            height: 600px;
            border: 2px solid #ccc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Widget Cache Management Test</h1>
    
    <div class="test-section">
        <h3>Cache Management</h3>
        <button onclick="clearCache()">Clear Cache</button>
        <button onclick="clearAllCache()">Clear All Cache</button>
        <button onclick="initWidget()">Init Widget</button>
        <button onclick="initWidgetWithForceReload()">Init with Force Reload</button>
        <button onclick="checkVersion()">Check Version</button>
    </div>
    
    <div class="test-section">
        <h3>Version Info</h3>
        <div id="version-info">Loading...</div>
    </div>
    
    <div id="widget-container"></div>
    
    <!-- Load widget script -->
    <script src="./dist-widget/widget.js"></script>
    
    <script>
        function clearCache() {
            if (window.GridixWidget) {
                window.GridixWidget.clearCache();
                console.log('Cache cleared manually');
            } else {
                console.log('Widget not loaded yet');
            }
        }
        
        function clearAllCache() {
            if (window.GridixWidget) {
                window.GridixWidget.clearCache();
                // Also clear localStorage manually
                localStorage.removeItem('gridix-widget-version');
                localStorage.removeItem('gridix-widget-last-check');
                localStorage.removeItem('gridix-widget-load-count');
                console.log('All cache cleared manually');
                checkVersion();
            } else {
                console.log('Widget not loaded yet');
            }
        }
        
        function initWidget() {
            if (window.GridixWidget) {
                window.GridixWidget.init({
                    projectId: 'test-project',
                    containerId: 'widget-container'
                });
            } else {
                console.log('Widget not loaded yet');
            }
        }
        
        function initWidgetWithForceReload() {
            if (window.GridixWidget) {
                window.GridixWidget.init({
                    projectId: 'test-project',
                    containerId: 'widget-container',
                    forceReload: true
                });
            } else {
                console.log('Widget not loaded yet');
            }
        }
        
        function checkVersion() {
            const buildVersion = typeof __WIDGET_VERSION__ !== 'undefined' ? __WIDGET_VERSION__ : 'undefined';
            const runtimeVersion = window.__GRIDIX_WIDGET_VERSION__ || 'undefined';
            const storedVersion = localStorage.getItem('gridix-widget-version') || 'none';
            const lastCheck = localStorage.getItem('gridix-widget-last-check') || 'none';
            const loadCount = localStorage.getItem('gridix-widget-load-count') || '0';
            
            document.getElementById('version-info').innerHTML = `
                <strong>Build Version:</strong> ${buildVersion}<br>
                <strong>Runtime Version:</strong> ${runtimeVersion}<br>
                <strong>Stored Version:</strong> ${storedVersion}<br>
                <strong>Last Check:</strong> ${lastCheck}<br>
                <strong>Load Count:</strong> ${loadCount}
            `;
        }
        
        // Check version on load
        window.addEventListener('load', checkVersion);
    </script>
</body>
</html>
