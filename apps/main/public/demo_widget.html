<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div
      id="gridix-widget-root"
      style="min-height: 100vh; width: 100%; position: relative; z-index: 1000"
    ></div>
    <script src="https://app.gridix.live/widget/index.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        window.GridixWidget &&
          window.GridixWidget.init({
            lang: "en",
            showFullProject: true,
            showFloatingButton: true,
            floatingButtonSide: "right",
            floatingButtonBottomOffset: 40,
            floatingButtonSideOffset: 32,
            projectId: "demo-project",
          });
      });
    </script>
  </body>
</html>
