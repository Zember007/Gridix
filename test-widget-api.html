<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Gridix Widget API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        h1, h2 {
            color: #1f2937;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #374151;
        }
        
        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        
        button {
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        .result {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .error {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
        }
        
        .success {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }
        
        .widget-test {
            border: 2px dashed #d1d5db;
            min-height: 300px;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Gridix Widget API</h1>
        <p>Use this page to test the widget API and JavaScript embedding system.</p>
        
        <div class="form-group">
            <label for="apiType">API Type:</label>
            <select id="apiType">
                <option value="user">All projects by User ID</option>
                <option value="projectSlug">Single project by Slug</option>
                <option value="projectId">Single project by ID</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="identifier">Identifier:</label>
            <input type="text" id="identifier" placeholder="Enter User ID, Project Slug, or Project ID">
        </div>
        
        <div class="form-group">
            <label for="lang">Language:</label>
            <select id="lang">
                <option value="en">English</option>
                <option value="ru">Russian</option>
                <option value="uz">Uzbek</option>
                <option value="kz">Kazakh</option>
            </select>
        </div>
        
        <button onclick="testAPI()">🚀 Test API</button>
        <button onclick="testWidget()">🎨 Test Widget</button>
        <button onclick="clearResults()">🗑️ Clear Results</button>
        
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <div class="container">
        <h2>📊 Widget Preview</h2>
        <p>The widget will appear below after clicking "Test Widget":</p>
        <div id="widgetContainer" class="widget-test">
            <p style="text-align: center; color: #6b7280; margin-top: 120px;">
                Widget will appear here after testing...
            </p>
        </div>
    </div>

    <script src="/gridix-embed.js"></script>
    <script>
        async function testAPI() {
            const apiType = document.getElementById('apiType').value;
            const identifier = document.getElementById('identifier').value;
            const lang = document.getElementById('lang').value;
            const resultDiv = document.getElementById('result');
            
            if (!identifier.trim()) {
                showResult('❌ Please enter an identifier', 'error');
                return;
            }
            
            const params = new URLSearchParams({ lang });
            
            switch(apiType) {
                case 'user':
                    params.append('userId', identifier);
                    break;
                case 'projectSlug':
                    params.append('projectSlug', identifier);
                    break;
                case 'projectId':
                    params.append('projectId', identifier);
                    break;
            }
            
            const apiUrl = `https://owilwkmenbrcinfwuvyx.supabase.co/functions/v1/widget-embed-api?${params.toString()}`;
            
            try {
                showResult('🔄 Loading...', 'info');
                
                const response = await fetch(apiUrl, {
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                });
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showResult(`✅ API Response:\n\n${JSON.stringify(data, null, 2)}`, 'success');
                } else {
                    showResult(`❌ API Error:\n\n${JSON.stringify(data, null, 2)}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Network Error:\n\n${error.message}`, 'error');
            }
        }
        
        function testWidget() {
            const apiType = document.getElementById('apiType').value;
            const identifier = document.getElementById('identifier').value;
            const lang = document.getElementById('lang').value;
            const container = document.getElementById('widgetContainer');
            
            if (!identifier.trim()) {
                showResult('❌ Please enter an identifier', 'error');
                return;
            }
            
            // Clear previous widget
            container.innerHTML = '<div style="text-align: center; padding: 40px;"><div style="display: inline-block; width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div><p>Loading widget...</p></div>';
            
            const options = {
                container: container,
                lang: lang,
                theme: 'default',
                showHeader: true
            };
            
            switch(apiType) {
                case 'user':
                    options.userId = identifier;
                    break;
                case 'projectSlug':
                    options.projectSlug = identifier;
                    break;
                case 'projectId':
                    options.projectId = identifier;
                    break;
            }
            
            try {
                new GridixEmbed(options);
                showResult(`✅ Widget initialized with options:\n\n${JSON.stringify(options, null, 2)}`, 'success');
            } catch (error) {
                showResult(`❌ Widget Error:\n\n${error.message}`, 'error');
                container.innerHTML = `<p style="text-align: center; color: #dc2626; margin-top: 120px;">❌ Error loading widget: ${error.message}</p>`;
            }
        }
        
        function showResult(message, type = 'info') {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.textContent = message;
            resultDiv.className = 'result ' + type;
        }
        
        function clearResults() {
            const resultDiv = document.getElementById('result');
            const container = document.getElementById('widgetContainer');
            
            resultDiv.style.display = 'none';
            container.innerHTML = '<p style="text-align: center; color: #6b7280; margin-top: 120px;">Widget will appear here after testing...</p>';
        }
        
        // Add CSS animation for loading spinner
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);
        
        // Example data for quick testing
        document.addEventListener('DOMContentLoaded', function() {
            // You can uncomment these lines and fill in real IDs for quick testing
            // document.getElementById('identifier').value = 'your-test-user-id';
            // document.getElementById('apiType').value = 'user';
        });
    </script>
</body>
</html>
