<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <iframe 
  id="gridix-widget"
  src="http://localhost:8080/embed/project/e30f35ba-175e-497c-9f71-605a1a44d5ed?lang=ru" 
  width="100%" 
  height="100%"
  style="height: 100vh; width: 100%;"
  frameborder="0"
  allowfullscreen>
</iframe>

<script>
    const iframe = document.getElementById("gridix-widget");

    window.addEventListener("message", (event) => {
        if (event.data.type === "IFRAME_HEIGHT" && iframe) {
            iframe.style.height = event.data.height + "px";
        }
    });
</script>

</body>
</html>
